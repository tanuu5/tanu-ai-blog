<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 学 園</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #0a0a12;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', 'Yu Mincho', 'HG明朝E', serif;
  overflow: hidden;
}

/* ─── GAME CONTAINER ─── */
#game {
  position: relative;
  width: 960px; height: 540px;
  overflow: hidden;
  cursor: pointer;
  -webkit-user-select: none; user-select: none;
  box-shadow: 0 0 80px rgba(0,0,0,0.8);
}

/* ─── BACKGROUNDS ─── */
#bg-layer {
  position: absolute; inset: 0;
  transition: opacity 0.6s ease;
}
#bg-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

/* ─── STAGE ─── */
#stage {
  position: absolute;
  bottom: 145px; left: 0; right: 0;
  height: 385px;
}
.char-el {
  position: absolute;
  bottom: 0;
  -webkit-transition: opacity 0.45s ease, -webkit-filter 0.45s ease, -webkit-transform 0.45s ease;
  transition: opacity 0.45s ease, filter 0.45s ease, transform 0.45s ease;
  transform-origin: bottom center;
}
.char-el.hidden {
  opacity: 0;
  transform: translateY(18px);
  pointer-events: none;
}
.char-el.visible { opacity: 1; transform: translateY(0); }
.char-el.dim {
  -webkit-filter: brightness(0.4) saturate(0.4);
  filter: brightness(0.4) saturate(0.4);
}
.char-el.bright {
  -webkit-filter: brightness(1.08) drop-shadow(0 0 12px rgba(255,255,255,0.15));
  filter: brightness(1.08) drop-shadow(0 0 12px rgba(255,255,255,0.15));
}

/* ─── TEXTBOX ─── */
#textbox {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 148px;
  background: linear-gradient(to bottom, rgba(4,8,22,0.78) 0%, rgba(4,8,22,0.95) 100%);
  border-top: 1px solid rgba(160,190,255,0.18);
  padding: 14px 44px 14px 44px;
  -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
}
#name-wrap {
  height: 28px; margin-bottom: 6px;
}
#name-plate {
  display: none;
  font-size: 15px;
  font-weight: 700;
  padding: 3px 14px 3px 10px;
  border-radius: 2px;
  letter-spacing: 0.18em;
  line-height: 1.4;
}
#dialogue {
  font-size: 17.5px;
  line-height: 1.9;
  color: #e8eeff;
  letter-spacing: 0.06em;
  text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  min-height: 66px;
}
#next-arrow {
  position: absolute;
  bottom: 10px; right: 22px;
  font-size: 11px;
  letter-spacing: 0.2em;
  color: rgba(180,200,255,0.45);
  -webkit-animation: blink 1.4s ease-in-out infinite;
  animation: blink 1.4s ease-in-out infinite;
}
@-webkit-keyframes blink { 0%,100%{opacity:.25} 50%{opacity:1} }
@keyframes blink          { 0%,100%{opacity:.25} 50%{opacity:1} }

/* ─── FADE OVERLAY ─── */
#fade {
  position: absolute; inset: 0;
  background: black;
  opacity: 0;
  pointer-events: none;
  -webkit-transition: opacity 0.5s ease;
  transition: opacity 0.5s ease;
  z-index: 60;
}
#fade.on { opacity: 1; }

/* ─── TITLE SCREEN ─── */
#title-screen {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 120% 100% at 50% 60%, #13133a 0%, #08081f 55%, #030310 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100;
  -webkit-transition: opacity 0.8s ease;
  transition: opacity 0.8s ease;
}
#title-screen.fade-out { opacity: 0; pointer-events: none; }

.stars-layer { position: absolute; inset: 0; overflow: hidden; }
.star {
  position: absolute; border-radius: 50%; background: white;
  -webkit-animation: twinkle var(--d,2s) ease-in-out infinite;
  animation: twinkle var(--d,2s) ease-in-out infinite;
  -webkit-animation-delay: var(--dd,0s);
  animation-delay: var(--dd,0s);
}
@-webkit-keyframes twinkle { 0%,100%{opacity:.1} 50%{opacity:.9} }
@keyframes twinkle          { 0%,100%{opacity:.1} 50%{opacity:.9} }

.title-school-name {
  position: relative;
  font-size: 72px;
  letter-spacing: 0.4em;
  color: #fff;
  text-shadow: 0 0 18px rgba(120,160,255,0.9), 0 0 50px rgba(100,140,255,0.45), 0 0 100px rgba(80,120,255,0.2);
  margin-bottom: 6px;
}
.title-sub {
  font-size: 14px;
  letter-spacing: 0.7em;
  color: rgba(180,210,255,0.55);
  margin-bottom: 52px;
}
.title-chars-row {
  display: flex; gap: 28px;
  margin-bottom: 52px;
}
.title-char-card {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.title-char-icon {
  width: 56px; height: 80px;
  border-radius: 4px;
  overflow: hidden;
  display: flex; align-items: flex-start; justify-content: center;
}
.title-char-label {
  font-size: 11px;
  letter-spacing: 0.2em;
}

#start-btn {
  padding: 11px 48px;
  background: transparent;
  border: 1px solid rgba(140,175,255,0.45);
  color: rgba(200,225,255,0.88);
  font-size: 16px;
  font-family: inherit;
  letter-spacing: 0.45em;
  cursor: pointer;
  -webkit-transition: all 0.3s; transition: all 0.3s;
  border-radius: 2px;
}
#start-btn:hover {
  background: rgba(100,140,255,0.12);
  border-color: rgba(160,200,255,0.85);
  color: #fff;
  box-shadow: 0 0 20px rgba(100,140,255,0.2);
}
.title-tap-hint {
  margin-top: 18px;
  font-size: 11px;
  letter-spacing: 0.3em;
  color: rgba(160,190,255,0.35);
  -webkit-animation: blink 2.2s ease-in-out infinite;
  animation: blink 2.2s ease-in-out infinite;
}

/* ─── END SCREEN ─── */
#end-screen {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 80;
  opacity: 0;
  pointer-events: none;
  -webkit-transition: background 1.5s ease, opacity 1.5s ease;
  transition: background 1.5s ease, opacity 1.5s ease;
}
#end-screen.show {
  background: rgba(4,6,20,0.93);
  opacity: 1;
  pointer-events: auto;
}
.end-title {
  font-size: 30px;
  letter-spacing: 0.6em;
  color: rgba(200,220,255,0.88);
  margin-bottom: 12px;
}
.end-sub {
  font-size: 13px;
  letter-spacing: 0.4em;
  color: rgba(160,190,255,0.5);
  margin-bottom: 48px;
}
#restart-btn {
  padding: 9px 34px;
  background: transparent;
  border: 1px solid rgba(140,175,255,0.38);
  color: rgba(190,215,255,0.8);
  font-size: 14px;
  font-family: inherit;
  letter-spacing: 0.35em;
  cursor: pointer;
  -webkit-transition: all 0.3s; transition: all 0.3s;
  border-radius: 2px;
}
#restart-btn:hover {
  background: rgba(100,140,255,0.12);
  border-color: rgba(160,200,255,0.8);
  color: #fff;
}

/* ─── CHOICE UI ─── */
#choice-box {
  position: absolute;
  bottom: 158px; left: 0; right: 0;
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  z-index: 50;
  pointer-events: none;
  opacity: 0;
  -webkit-transition: opacity 0.3s ease;
  transition: opacity 0.3s ease;
}
#choice-box.show {
  opacity: 1;
  pointer-events: auto;
}
.choice-btn {
  width: min(480px, 88%);
  padding: 12px 28px;
  background: rgba(6,10,30,0.88);
  border: 1px solid rgba(140,175,255,0.38);
  color: rgba(210,228,255,0.9);
  font-size: 16px;
  font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
  letter-spacing: 0.12em;
  text-align: left;
  cursor: pointer;
  border-radius: 3px;
  -webkit-transition: background 0.2s, border-color 0.2s, color 0.2s, -webkit-transform 0.15s;
  transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
}
.choice-btn:hover {
  background: rgba(60,90,200,0.28);
  border-color: rgba(160,200,255,0.8);
  color: #fff;
  -webkit-transform: translateX(6px);
  transform: translateX(6px);
}
.choice-btn::before {
  content: '▶ ';
  opacity: 0.5;
  font-size: 10px;
}
</style>
</head>
<body>
<div id="game">

  <!-- BACKGROUND -->
  <div id="bg-layer">
    <svg id="bg-svg" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <!-- STAGE -->
  <div id="stage">
    <div class="char-el hidden" id="c-claude"  ></div>
    <div class="char-el hidden" id="c-chatgpt" ></div>

    <div class="char-el hidden" id="c-grok"    ></div>
  </div>

  <!-- TEXTBOX -->
  <div id="textbox">
    <div id="name-wrap"><span id="name-plate"></span></div>
    <div id="dialogue"></div>

  <div id="choice-box"></div>

  <div id="title-screen">

    <button id="start-btn">は じ め る</button>
    <div class="title-tap-hint">— タップまたはクリックで始める —</div>
  </div>

  <!-- END SCREEN -->
  <div id="end-screen">
    <div class="end-title">— お わ り —</div>
    <div class="end-sub">AI学園の物語は、まだ続く……</div>
    <button id="restart-btn">もう一度読む</button>

</div>

    out += '<polygon points="' + (mx-7) + ',' + (y+18) + ' ' + (mx+7) + ',' + (y+18) + ' ' + (mx+4) + ',' + (y+34) + ' ' + (mx-4) + ',' + (y+34) + '" fill="' + col + '" opacity="0.88"/>';

var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function seClick() {
  try {
    var ctx = getAudioCtx();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.10, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.12);
  } catch(e) {}
}

function seScene() {
  try {
    var ctx = getAudioCtx();
    var freqs = [523, 659, 784, 1047];
    for (var fi = 0; fi < freqs.length; fi++) {
      (function(f, delay) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(f, ctx.currentTime + delay);
        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(0.09, ctx.currentTime + delay + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.35);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.38);
      })(freqs[fi], fi * 0.1);
    }
  } catch(e) {}
}

function getPos(chars) {

  if (n === 0) return {};

  if (n === 2) return { [chars[0]]: '15%', [chars[1]]: '52%' };
  if (n === 3) return { [chars[0]]: '5%', [chars[1]]: '30%', [chars[2]]: '57%' };
  return { claude:'1%', chatgpt:'24%', gemini:'50%', grok:'70%' };

      } else if (entry.sp === c) {
        el.classList.remove('dim'); el.classList.add('bright');
      } else {
        el.classList.remove('dim','bright');
      }
    } else {
      el.classList.add('hidden');
      el.classList.remove('visible','dim','bright');
    }
  });
  var np = document.getElementById('name-plate');
  if (entry.sp && CHARS[entry.sp]) {
    var ch = CHARS[entry.sp];
    np.textContent = ch.name;
    np.style.color = ch.color;
    np.style.background = ch.nameBg;
    np.style.borderLeft = '3px solid ' + ch.borderColor;
    np.style.display = 'inline-block';
  } else {
    np.style.display = 'none';
  }
}

var pendingDone = null;  // typeText の onDone を skipType でも呼べるよう保持

function typeText(text, onDone) {
  var el = document.getElementById('dialogue');
  el.textContent = '';
  typing = true;
  pendingDone = onDone;
  document.getElementById('next-arrow').style.opacity = '0';
  var i = 0;
  function tick() {
    if (i < text.length) {
      el.textContent += text[i++];
      if (i % 3 === 0) seClick();
      timer = setTimeout(tick, 38);
    } else {
      typing = false;
      pendingDone = null;
      if (!choiceActive) document.getElementById('next-arrow').style.opacity = '1';
      if (onDone) onDone();
    }
  }
  tick();
}

function skipType() {
  if (timer) clearTimeout(timer);
  var e = SCRIPT[idx];
  document.getElementById('dialogue').textContent = e.text;
  typing = false;
  var cb = pendingDone;
  pendingDone = null;
  if (!choiceActive) document.getElementById('next-arrow').style.opacity = '1';
  if (cb) cb();  // ← これがないと選択肢が出なかった
}

function hideChoices() {
  var box = document.getElementById('choice-box');
  box.classList.remove('show');
  box.innerHTML = '';
  choiceActive = false;
  document.getElementById('next-arrow').style.opacity = '0';
}

function showChoices(choices) {
  choiceActive = true;
  document.getElementById('next-arrow').style.opacity = '0';
  var box = document.getElementById('choice-box');
  box.innerHTML = '';
  choices.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.label;
    btn.addEventListener('mouseenter', function() { seChoiceHover(); });
    btn.addEventListener('click', function(ev) {
      ev.stopPropagation();
      seChoice();
      hideChoices();
      // jump先へ
      var target = idMap[c.jump];
      if (target !== undefined) {
        idx = target;
        showIdx(idx);
      }
    });
    btn.addEventListener('touchend', function(ev) {
      ev.preventDefault();
      ev.stopPropagation();
      seChoice();
      hideChoices();
      var target = idMap[c.jump];
      if (target !== undefined) {
        idx = target;
        showIdx(idx);
      }
    });
    box.appendChild(btn);
  });
  box.classList.add('show');
}

function showIdx(i) {
  if (i >= SCRIPT.length) return;
  var e = SCRIPT[i];
  // シーン転換判定（背景が変わったらSE）
  var prevBg = i > 0 ? SCRIPT[i-1].bg : null;
  if (prevBg && prevBg !== e.bg) seScene();
  applyEntry(e);
  typeText(e.text, function() {
    if (e.end) {
      setTimeout(showEnd, 900);
    } else if (e.choice) {
      showChoices(e.choice);
    }
  });
}

function advance() {
  if (choiceActive) return;  // 選択肢表示中はクリック無効
  if (typing) { skipType(); return; }
  var e = SCRIPT[idx];
  if (e.end) { showEnd(); return; }
  if (e.choice) return; // 選択肢待ちはスキップしない
  // jump属性があれば飛ぶ（ルート末尾の合流）
  if (e.jump && idMap[e.jump] !== undefined) {
    idx = idMap[e.jump];
    showIdx(idx);
    return;
  }
  idx++;
  if (idx < SCRIPT.length) showIdx(idx);
}

function showEnd() {
  document.getElementById('end-screen').classList.add('show');
  seScene();
}

function startGame() {
  seStart();
  var ts = document.getElementById('title-screen');
  ts.classList.add('fade-out');
  setTimeout(function() { ts.style.display = 'none'; }, 850);
  started = true;
  idx = 0;
  showIdx(0);
}

function restartGame() {
  document.getElementById('end-screen').classList.remove('show');
  hideChoices();
  idx = 0;
  showIdx(0);
}

// Button event listeners
document.getElementById('start-btn').addEventListener('click', function(e) {
  e.stopPropagation();
  startGame();
});
document.getElementById('restart-btn').addEventListener('click', function(e) {
  e.stopPropagation();
  restartGame();
});

// タイトル画面：どこをクリック/タップしても開始
document.getElementById('title-screen').addEventListener('click', function() {
  if (!started) startGame();
});
document.getElementById('title-screen').addEventListener('touchend', function(e) {
  e.preventDefault();
  if (!started) startGame();
});

// Click/tap to advance (ゲーム中)
document.getElementById('game').addEventListener('click', function() {
  if (!started) return;
  if (document.getElementById('end-screen').classList.contains('show')) return;
  advance();
});
document.getElementById('game').addEventListener('touchend', function(e) {
  e.preventDefault();
  if (!started) return;
  if (document.getElementById('end-screen').classList.contains('show')) return;
  advance();
});

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.code === 'Enter' || e.code === 'ArrowRight') {
    e.preventDefault();
    if (!started) { startGame(); return; }
    if (document.getElementById('end-screen').classList.contains('show')) return;
    advance();
  }
});
